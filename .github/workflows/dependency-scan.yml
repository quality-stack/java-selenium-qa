name: Dependency Scan

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: maven

      - name: Run dependency scan
        run: >
          mvn -B -DskipTests
          org.owasp:dependency-check-maven:12.2.1:check
          -Dformats=HTML,JSON,SARIF
          -DfailBuildOnCVSS=11

      - name: Upload dependency reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
            target/dependency-check-report.sarif
          if-no-files-found: warn

      - name: Detect SARIF output
        id: sarif
        if: always()
        shell: bash
        run: |
          if [ -f target/dependency-check-report.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.sarif.outputs.exists == 'true'
        with:
          sarif_file: target/dependency-check-report.sarif
